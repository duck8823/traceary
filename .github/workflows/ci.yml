name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Verify bilingual docs
        run: go run ./cmd/repo-tooling docs verify-i18n

      - name: Verify removed-alias examples
        run: python3 scripts/verify_docs_no_removed_aliases.py

      - name: Verify changelog coverage
        run: python3 scripts/verify_changelog_releases.py

      - name: Verify landing page in sync with VERSION
        run: python3 scripts/verify_landing.py

      - name: Verify release-drafter workflow
        run: python3 scripts/verify_release_drafter_workflow.py

  integrations:
    name: Integrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify release manifests
        run: python3 scripts/verify_release_manifests.py

      - name: Verify packaged integrations
        run: go run ./cmd/repo-tooling integrations verify

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        run: go tool golangci-lint run --timeout=5m
