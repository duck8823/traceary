name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'

      - name: Verify bilingual docs
        run: go run ./cmd/repo-tooling docs verify-i18n

      - name: Verify Antigravity current-state wording
        run: go run ./cmd/repo-tooling docs verify-antigravity-status

      - name: Verify removed-alias examples
        run: python3 scripts/verify_docs_no_removed_aliases.py

      - name: Verify changelog coverage
        run: go run ./cmd/repo-tooling release verify-changelog

      - name: Verify landing page in sync with VERSION
        run: go run ./cmd/repo-tooling docs verify-landing

      - name: Verify release-drafter workflow
        run: python3 scripts/verify_release_drafter_workflow.py

  integrations:
    name: Integrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify release manifests
        run: python3 scripts/verify_release_manifests.py

      - name: Verify packaged integrations
        run: go run ./cmd/repo-tooling integrations verify

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        run: go tool golangci-lint run --timeout=5m
