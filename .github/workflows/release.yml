name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish or recover
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
      RELEASE_REF: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      IS_TAG_RELEASE: ${{ inputs.tag != '' || github.ref_type == 'tag' }}
    steps:
      - name: Validate requested tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        env:
          WORKFLOW_INPUT_TAG: ${{ inputs.tag }}
        run: |
          case "${WORKFLOW_INPUT_TAG}" in
            v*) ;;
            *)
              echo "workflow_dispatch tag input must start with v" >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'

      - name: Verify changelog coverage
        run: go run ./cmd/repo-tooling release verify-changelog

      - name: Verify Antigravity current-state wording
        run: go run ./cmd/repo-tooling docs verify-antigravity-status

      - name: Verify release manifests
        run: python3 scripts/verify_release_manifests.py

      - name: Verify landing page in sync with VERSION
        run: go run ./cmd/repo-tooling docs verify-landing

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9a127d869fb706213d29cdf8eef3a4ea2b869415 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: ${{ env.IS_TAG_RELEASE == 'true' && 'release --clean' || 'release --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Gemini extension archive
        run: ./scripts/package_gemini_extension.sh

      - name: Upload Gemini extension archive
        if: env.IS_TAG_RELEASE == 'true'
        run: gh release upload "${RELEASE_TAG}" dist/traceary.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Create Homebrew GitHub App token
        if: env.IS_TAG_RELEASE == 'true'
        id: homebrew-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.HOMEBREW_APP_CLIENT_ID != '' && vars.HOMEBREW_APP_CLIENT_ID || secrets.HOMEBREW_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            traceary

      - name: Resolve Homebrew GitHub App bot user
        if: env.IS_TAG_RELEASE == 'true'
        id: homebrew-app-user
        run: echo "user-id=$(gh api '/users/${{ steps.homebrew-app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}

      - name: Open or update Homebrew formula PR
        if: env.IS_TAG_RELEASE == 'true'
        run: |
          set -euo pipefail

          branch="maintenance/homebrew-${RELEASE_TAG}"
          title="chore(homebrew): update formula for traceary ${RELEASE_TAG}"
          body=$(cat <<EOF
          ## Summary

          - update \`Formula/traceary.rb\` for ${RELEASE_TAG}
          - generated from release workflow ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          git config user.name "${HOMEBREW_APP_SLUG}[bot]"
          git config user.email "${HOMEBREW_APP_USER_ID}+${HOMEBREW_APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B "${branch}" origin/main
          cp dist/homebrew/Formula/traceary.rb Formula/traceary.rb

          if git diff --quiet -- Formula/traceary.rb; then
            echo "Formula/traceary.rb is already up to date on main."
            exit 0
          fi

          git add Formula/traceary.rb
          git commit -m "${title}"
          git push --force-with-lease origin "${branch}"

          existing_pr="$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "${title}" --body "${body}"
            pr_number="${existing_pr}"
          else
            pr_url="$(gh pr create --base main --head "${branch}" --title "${title}" --body "${body}")"
            pr_number="$(echo "${pr_url}" | grep -oE '[0-9]+$')"
          fi

          # Enable auto-merge so the PR merges after CI passes
          if [[ -n "${pr_number}" ]]; then
            gh pr merge "${pr_number}" --auto --merge || true
          fi
        env:
          GH_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}
          HOMEBREW_APP_SLUG: ${{ steps.homebrew-app-token.outputs.app-slug }}
          HOMEBREW_APP_USER_ID: ${{ steps.homebrew-app-user.outputs.user-id }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Close matching parent release issue
        if: env.IS_TAG_RELEASE == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            // Accepted prefixes: the full tag (v0.7.0:) and the
            // minor-version form (v0.7:) the repository has historically
            // used for umbrella issues. Both variants are searched
            // separately so a tag like v0.7.0 closes either a "v0.7.0: ..."
            // or a "v0.7: ..." umbrella, whichever the operator opened.
            const acceptedPrefixes = [`${tag}:`];
            const minorPrefixMatch = tag.match(/^(v\d+\.\d+)\.0$/);
            if (minorPrefixMatch) {
              acceptedPrefixes.push(`${minorPrefixMatch[1]}:`);
            }

            // Defensive guard: when matching the minor-version prefix
            // (`v0.7:`), GitHub's title search does not collide with
            // patch-version umbrellas like `v0.7.1:` because the literal
            // `:` is not a substring of `v0.7.1:` at the right position,
            // but re-asserting the invariant via a patch-version regex
            // makes the intent explicit for future readers.
            const patchVersionPrefix = /^v\d+\.\d+\.\d+:/;
            const seen = new Map();
            for (const prefix of acceptedPrefixes) {
              const query = `repo:${owner}/${repo} is:issue is:open in:title "${prefix}"`;
              const { data: search } = await github.rest.search.issuesAndPullRequests({
                q: query,
                per_page: 10,
              });
              for (const item of search.items) {
                if (item.pull_request) continue;
                if (!item.title.startsWith(prefix)) continue;
                // When the fallback prefix is the minor form (`v0.7:`)
                // but the title actually starts with a patch form
                // (`v0.7.1:`), skip — the minor umbrella is being
                // closed, not a future patch umbrella.
                if (prefix === acceptedPrefixes[acceptedPrefixes.length - 1]
                  && acceptedPrefixes.length > 1
                  && patchVersionPrefix.test(item.title)) {
                  continue;
                }
                seen.set(item.number, item);
              }
            }
            const issues = Array.from(seen.values());

            if (issues.length === 0) {
              core.info(`No open parent release issue matched ${tag}.`);
              return;
            }

            if (issues.length > 1) {
              core.setFailed(`Ambiguous parent release issue for ${tag}: ${issues.map((item) => `#${item.number}`).join(', ')}`);
              return;
            }

            const issue = issues[0];
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `Closing automatically because the GitHub Release [${tag}](${release.html_url}) published successfully.`,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              state: 'closed',
            });
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
