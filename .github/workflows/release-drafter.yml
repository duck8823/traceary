name: Update draft release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7

  autolabel:
    # Homebrew formula PRs are generated by the release workflow with a
    # short-lived GitHub App token and auto-merge after CI passes. Release-prep
    # PRs are versioning/changelog wrappers for changes that are already
    # categorized by their implementation PRs. Neither branch family is an
    # input to release-note classification, so skip autolabel instead of
    # leaving a non-required failed check when the pull_request credential
    # cannot label the PR.
    if: >-
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'maintenance/homebrew-v') &&
      !startsWith(github.head_ref, 'maintenance/release-v')
    permissions:
      contents: read
      # PR labels are issue labels in GitHub's API.
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter/autolabeler@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
