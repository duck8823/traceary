version: 2

project_name: traceary

builds:
  - id: traceary
    binary: traceary
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X main.version={{ .Version }}
        -X main.commit={{ .FullCommit }}
        -X main.date={{ .Date }}

archives:
  - id: binaries
    ids:
      - traceary
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - README.ja.md
      - CHANGELOG.md
      - CHANGELOG.ja.md

checksum:
  name_template: checksums.txt

brews:
  - ids:
      - traceary
    directory: Formula
    repository:
      owner: duck8823
      name: traceary
      branch: main
    homepage: https://github.com/duck8823/traceary
    description: Local-first CLI and MCP server for AI agent work history
    license: MIT
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore(homebrew): update formula for {{ .ProjectName }} {{ .Tag }}"
    install: |
      bin.install "traceary"
    test: |
      system "#{bin}/traceary", "version"

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: duck8823
    name: traceary

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
